{% extends 'admin/base.html' %}
{% block title %}Gallery — Command Center{% endblock %}
{% block content %}
<div class="adm-topbar">
  <div class="adm-pg-title">Gallery</div>
</div>

<!-- Upload -->
<div class="adm-form" style="margin-bottom:28px">
  <h3 style="font-family:var(--f-ui);font-size:17px;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px">Upload Image</h3>
  <form method="POST" action="{{ url_for('admin_upload') }}" enctype="multipart/form-data">
    <div class="frow">
      <div class="fld"><label>Image *</label>
        <input type="file" name="image" accept="image/*" required style="padding:8px">
      </div>
      <div class="fld"><label>Category</label>
        <select name="category">
          {% for c in ['parade','camp','training','events','awards','other'] %}
          <option value="{{ c }}">{{ c|title }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fld"><label>Caption</label><input type="text" name="caption" placeholder="Describe the photo…"></div>
      <div class="fld"><label>Year</label><input type="number" name="year" value="2025" min="2000" max="2035"></div>
    </div>
    <button type="submit" class="btn btn-gold">Upload</button>
  </form>
</div>

<!-- Grid -->
{% if imgs %}
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px">
  {% for img in imgs %}
  <div style="background:var(--glass);border:1px solid var(--border);border-radius:5px;overflow:hidden">
    <img src="{{ url_for('static',filename='uploads/gallery/'+img['filename']) }}"
         style="width:100%;height:130px;object-fit:cover" alt="{{ img['caption'] }}">
    <div style="padding:9px">
      <div style="font-size:12px;color:var(--white);margin-bottom:5px">{{ img['caption'] or '—' }}</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="sbadge" style="background:rgba(200,168,60,.1);border:1px solid rgba(200,168,60,.2);color:var(--gold);font-size:9px">{{ img['category'] }}</span>
        <form method="POST" action="{{ url_for('admin_delete_gallery', gid=img['id']) }}" onsubmit="return confirm('Delete?')">
          <button style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:15px;line-height:1">✕</button>
        </form>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<div style="text-align:center;padding:60px;color:var(--muted)">
  <p style="font-family:var(--f-ui);font-size:18px">No images uploaded yet.</p>
</div>
{% endif %}
{% endblock %}
